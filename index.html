<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Medical Receipt Translator</title>
<style>
:root {
  --bg: #f4f6f9;
  --surface: #ffffff;
  --border: #e2e8f0;
  --accent: #1d4ed8;
  --accent-light: #eff6ff;
  --green: #059669;
  --red: #dc2626;
  --text: #1e293b;
  --text2: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center;
  padding-bottom: 48px;
}
header {
  width: 100%; background: var(--accent);
  padding: 18px 20px 16px; text-align: center;
}
header h1 { font-size: 18px; font-weight: 700; color: #fff; }
header p  { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 3px; }

.container {
  width: 100%; max-width: 480px;
  padding: 16px; display: flex; flex-direction: column; gap: 14px;
}
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.card-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; color: var(--text2); margin-bottom: 12px;
}

/* BURDEN */
.burden-row { display: flex; gap: 8px; }
.burden-btn {
  flex: 1; padding: 12px 4px;
  border: 2px solid var(--border); border-radius: 12px;
  background: var(--bg); font-size: 15px; font-weight: 700;
  color: var(--text2); cursor: pointer; transition: all .15s; text-align: center;
}
.burden-btn .label { display: block; font-size: 10px; font-weight: 400; margin-top: 2px; color: var(--text2); }
.burden-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.burden-btn.active .label { color: var(--accent); }

/* UPLOAD */
.upload-row { display: flex; gap: 10px; }
.upload-btn {
  flex: 1; padding: 18px 8px;
  border: 2px dashed var(--border); border-radius: 14px;
  background: var(--bg); cursor: pointer;
  text-align: center; transition: all .15s;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.upload-btn:active { opacity: .7; }
.upload-btn .ico { font-size: 30px; }
.upload-btn .lbl { font-size: 13px; font-weight: 600; color: var(--accent); }
.upload-btn .sub { font-size: 10px; color: var(--text2); }
input[type=file] { display: none; }

#previewSection { display: none; margin-top: 12px; }
#previewImg { width: 100%; border-radius: 12px; border: 1px solid var(--border); display: block; }
.change-link {
  display: block; text-align: center; margin-top: 10px;
  font-size: 13px; color: var(--accent); cursor: pointer; text-decoration: underline;
}

/* PROGRESS */
#progressSection { display: none; }
.progress-bar-wrap { background: var(--bg); border-radius: 999px; height: 10px; overflow: hidden; margin-bottom: 8px; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width .4s ease; width: 0%; }
.progress-label { font-size: 13px; color: var(--text2); text-align: center; }

/* BUTTONS */
.btn {
  width: 100%; padding: 16px; border-radius: 14px; border: none;
  font-size: 16px; font-weight: 700; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: scale(.97); opacity: .85; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-success { background: var(--green); color: #fff; }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

#resultSection { display: none; }
#outputCanvas { width: 100%; border-radius: 12px; border: 1px solid var(--border); display: block; }

.status-box {
  border-radius: 10px; padding: 12px; font-size: 13px;
  line-height: 1.6; display: none; white-space: pre-wrap;
  background: var(--accent-light); border: 1px solid #bfdbfe; color: var(--accent);
}
.status-box.error   { background: #fef2f2; border-color: #fecaca; color: var(--red); }
.status-box.success { background: #f0fdf4; border-color: #bbf7d0; color: var(--green); }

#wordListWrap { display: none; }
.word-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
.word-item {
  display: flex; align-items: center; gap: 8px; font-size: 12px;
  padding: 7px 10px; background: var(--bg); border-radius: 8px; flex-wrap: wrap;
}
.word-item .jp  { color: var(--text); font-weight: 600; min-width: 80px; }
.word-item .arr { color: var(--text2); }
.word-item .en  { color: var(--accent); font-weight: 600; }
.word-item .yen { color: var(--red); font-weight: 700; }
.word-item .sub { color: var(--text2); margin-left: auto; font-size: 11px; }

.note {
  font-size: 11px; color: var(--text2); line-height: 1.6;
  background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 12px;
}

/* OCR RESULT TEXT */
#ocrTextWrap { display: none; }
.ocr-text {
  font-size: 11px; font-family: monospace;
  background: #f8fafc; border: 1px solid var(--border);
  border-radius: 8px; padding: 10px;
  max-height: 150px; overflow-y: auto;
  white-space: pre-wrap; color: var(--text2);
  line-height: 1.6;
}
</style>
</head>
<body>

<header>
  <h1>🏥 Medical Receipt Translator</h1>
  <p>日本語の医療領収書を英語＆円換算</p>
</header>

<div class="container">

  <!-- STEP 1 -->
  <div class="card">
    <div class="card-title">① 窓口負担割合を選択</div>
    <div class="burden-row">
      <button class="burden-btn active" data-ratio="0.3" onclick="selectBurden(this)">30%<span class="label">一般（3割）</span></button>
      <button class="burden-btn" data-ratio="0.2" onclick="selectBurden(this)">20%<span class="label">2割</span></button>
      <button class="burden-btn" data-ratio="0.1" onclick="selectBurden(this)">10%<span class="label">高齢（1割）</span></button>
      <button class="burden-btn" data-ratio="1.0" onclick="selectBurden(this)">100%<span class="label">自費</span></button>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="card">
    <div class="card-title">② 領収書を選択</div>
    <div class="upload-row">
      <div class="upload-btn" onclick="document.getElementById('fileCamera').click()">
        <div class="ico">📷</div>
        <div class="lbl">カメラ撮影</div>
        <div class="sub">その場で撮る</div>
      </div>
      <div class="upload-btn" onclick="document.getElementById('filePhoto').click()">
        <div class="ico">🖼️</div>
        <div class="lbl">写真から選択</div>
        <div class="sub">フォトライブラリ</div>
      </div>
    </div>
    <!-- カメラ専用 -->
    <input type="file" id="fileCamera"  accept="image/*" capture="environment" onchange="handleFile(event)">
    <!-- 写真ライブラリ専用（captureなし → iOSはフォトライブラリを開く） -->
    <input type="file" id="filePhoto"   accept="image/*" onchange="handleFile(event)">

    <div id="previewSection">
      <img id="previewImg" src="" alt="preview">
      <span class="change-link" onclick="document.getElementById('filePhoto').click()">📁 別の写真を選択</span>
    </div>
  </div>

  <!-- STEP 3 -->
  <button class="btn btn-primary" id="processBtn" onclick="processImage()" disabled>
    🔍 AI解析＆翻訳を実行
  </button>

  <div class="card" id="progressSection">
    <div class="card-title">処理中...</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">準備中...</div>
  </div>

  <div id="statusBox" class="status-box"></div>

  <!-- OCR生テキスト（デバッグ用、折りたたみ） -->
  <div class="card" id="ocrTextWrap">
    <div class="card-title" style="cursor:pointer;" onclick="toggleOcr()">▶ AIが読み取ったテキスト（タップで表示）</div>
    <div class="ocr-text" id="ocrText" style="display:none;"></div>
  </div>

  <div class="card" id="wordListWrap">
    <div class="card-title">検出された項目</div>
    <div class="word-list" id="wordList"></div>
  </div>

  <div class="card" id="resultSection">
    <div class="card-title">翻訳済み画像プレビュー</div>
    <canvas id="outputCanvas"></canvas>
  </div>

  <button class="btn btn-success" id="saveBtn" onclick="saveImage()" style="display:none;">
    💾 画像として保存
  </button>

  <p class="note">
    ⚠️ Claude Vision AIが画像を直接解析するため、暗い写真・斜め撮影でも認識できます。<br>
    ※ 換算: 点数×10円×負担割合。合計金額が読み取れた場合は自動調整します。
  </p>

</div>

<script>
let selectedRatio = 0.3;
let loadedImageB64 = null;   // base64 (JPEG)
let loadedImageSrc = null;   // dataURL for canvas

function selectBurden(btn) {
  document.querySelectorAll('.burden-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedRatio = parseFloat(btn.dataset.ratio);
}

function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}

function showStatus(msg, type) {
  const b = document.getElementById('statusBox');
  b.textContent = msg;
  b.className = 'status-box' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
  b.style.display = 'block';
}

function toggleOcr() {
  const el = document.getElementById('ocrText');
  const title = el.closest('.card').querySelector('.card-title');
  if (el.style.display === 'none') {
    el.style.display = 'block';
    title.textContent = '▼ AIが読み取ったテキスト';
  } else {
    el.style.display = 'none';
    title.textContent = '▶ AIが読み取ったテキスト（タップで表示）';
  }
}

// EXIF回転補正
function getOrientation(buffer) {
  const view = new DataView(buffer);
  if (view.getUint16(0, false) !== 0xFFD8) return -2;
  let offset = 2;
  while (offset < view.byteLength) {
    if (view.getUint16(offset, false) === 0xFFE1) {
      offset += 4;
      if (view.getUint32(offset, false) !== 0x45786966) return -1;
      const little = view.getUint16(offset + 6, false) === 0x4949;
      offset += 6 + view.getUint32(offset + 4, little);
      const tags = view.getUint16(offset, little);
      offset += 2;
      for (let i = 0; i < tags; i++) {
        if (view.getUint16(offset + i * 12, little) === 0x0112)
          return view.getUint16(offset + i * 12 + 8, little);
      }
    } else if ((view.getUint16(offset, false) & 0xFF00) !== 0xFF00) break;
    else offset += 2 + view.getUint16(offset + 2, false);
  }
  return -1;
}

function fixOrientation(file) {
  return new Promise(resolve => {
    const fr = new FileReader();
    fr.onload = e => {
      const orientation = getOrientation(e.target.result);
      const blob = new Blob([e.target.result], { type: file.type });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        const ctx = c.getContext('2d');
        const w = img.naturalWidth, h = img.naturalHeight;
        if ([5,6,7,8].includes(orientation)) { c.width = h; c.height = w; }
        else { c.width = w; c.height = h; }
        ctx.save();
        switch(orientation) {
          case 2: ctx.transform(-1,0,0,1,w,0); break;
          case 3: ctx.transform(-1,0,0,-1,w,h); break;
          case 4: ctx.transform(1,0,0,-1,0,h); break;
          case 5: ctx.transform(0,1,1,0,0,0); break;
          case 6: ctx.transform(0,1,-1,0,h,0); break;
          case 7: ctx.transform(0,-1,-1,0,h,w); break;
          case 8: ctx.transform(0,-1,1,0,0,w); break;
        }
        ctx.drawImage(img, 0, 0);
        ctx.restore();
        URL.revokeObjectURL(url);
        // JPEG品質0.92で圧縮（API送信サイズ削減）
        resolve(c.toDataURL('image/jpeg', 0.92));
      };
      img.src = url;
    };
    fr.readAsArrayBuffer(file);
  });
}

async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const dataUrl = await fixOrientation(file);
  loadedImageSrc = dataUrl;
  // base64部分のみ取り出す（API送信用）
  loadedImageB64 = dataUrl.split(',')[1];

  document.getElementById('previewImg').src = dataUrl;
  document.getElementById('previewSection').style.display = 'block';
  document.getElementById('processBtn').disabled = false;
  ['resultSection','saveBtn','wordListWrap','statusBox','ocrTextWrap'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'none';
  });
}

// 数値文字列をパース
function parseNum(s) {
  return parseInt(
    (s || '').replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0))
             .replace(/[,，、\s]/g, ''),
    10
  );
}

// Claude Vision APIで領収書を解析
async function analyzeWithClaude(b64Image) {
  const prompt = `あなたは日本語の医療領収書を解析するアシスタントです。
以下の医療領収書の画像を解析して、JSONで結果を返してください。

返すJSONの形式:
{
  "items": [
    {
      "japanese": "項目名（日本語）",
      "english": "English translation",
      "points": 数値（点数。なければnull）,
      "position": "top" | "middle" | "bottom"
    }
  ],
  "total_points": 合計点数（数値、なければnull）,
  "total_yen": 窓口負担の合計金額（円、数値、なければnull）,
  "raw_text": "読み取ったテキスト全文"
}

翻訳のルール:
- 初診料 → Initial Visit Fee
- 再診料 → Follow-up Visit Fee
- 外来診療料 → Outpatient Fee
- 投薬 → Medication
- 処方料/処方せん料 → Prescription Fee
- 調剤 → Dispensing
- 薬剤 → Drug Fee
- 注射 → Injection
- 点滴 → IV Drip
- 検査 → Examination
- 血液検査 → Blood Test
- 尿検査 → Urinalysis
- レントゲン → X-ray
- CT検査 → CT Scan
- MRI → MRI
- 超音波 → Ultrasound
- 処置 → Treatment
- リハビリ → Rehabilitation
- 管理料 → Management Fee
- 指導料 → Guidance Fee
- 合計 → Total
- 小計 → Subtotal
- 一部負担金/窓口負担 → Patient Copay
- その他は適切に英訳してください

注意:
- 点数は「○○点」という形式で記載されています
- 合計金額（円）は「合計」「一部負担金」「窓口負担」などの行にあります
- JSONのみ返してください。説明文は不要です。`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: { type: 'base64', media_type: 'image/jpeg', data: b64Image }
          },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || 'API error ' + response.status);
  }

  const data = await response.json();
  const text = data.content.map(c => c.text || '').join('');
  // JSONを抽出（```json ... ``` に囲まれていても対応）
  const clean = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  return JSON.parse(clean);
}

async function processImage() {
  if (!loadedImageSrc) return;
  document.getElementById('processBtn').disabled = true;
  document.getElementById('progressSection').style.display = 'block';
  ['wordListWrap','resultSection','statusBox','ocrTextWrap'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('saveBtn').style.display = 'none';

  try {
    setProgress(10, 'Claude AIに画像を送信中...');

    const result = await analyzeWithClaude(loadedImageB64);

    setProgress(60, '解析結果を処理中...');

    // raw_text表示
    if (result.raw_text) {
      document.getElementById('ocrText').textContent = result.raw_text;
      document.getElementById('ocrTextWrap').style.display = 'block';
    }

    const items = result.items || [];
    const totalYen = (typeof result.total_yen === 'number') ? result.total_yen : null;

    // 点数→円換算（負担割合適用）
    const pointItems = items.filter(it => it.points && it.points > 0);
    pointItems.forEach(it => {
      it.yen = Math.round((it.points * 10 * selectedRatio) / 10) * 10;
    });

    // 合計金額に合わせて調整
    if (totalYen !== null && pointItems.length > 0) {
      const sumRaw = pointItems.reduce((s, it) => s + it.yen, 0);
      const diff = totalYen - sumRaw;
      if (diff !== 0) {
        // 最大点数の項目に差分吸収
        const maxItem = pointItems.reduce((a, b) => b.points > a.points ? b : a);
        maxItem.yen += diff;
      }
    }

    setProgress(75, 'Canvas に描画中...');

    // Canvas描画
    const img = new Image();
    await new Promise(res => { img.onload = res; img.src = loadedImageSrc; });

    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);

    const W = img.naturalWidth;
    const H = img.naturalHeight;
    const baseFontSize = Math.max(18, Math.round(W / 28));

    // PositionベースでY座標を推定して描画（APIはbboxを返さないため）
    // 代わりに、画像を縦3分割してtop/middle/bottomに配置
    const posY = { top: 0.15, middle: 0.5, bottom: 0.85 };
    const lineHeight = H / Math.max(items.length + 2, 8);

    // 項目を上から順に均等配置（bboxなしのため）
    const transItems = items.filter(it => it.japanese && it.english);
    const step = H / (transItems.length + 1);

    // 画像左側1/3に白帯を引いて英語で上書き
    transItems.forEach((it, idx) => {
      const y = step * (idx + 1);
      const rectH = lineHeight * 0.85;
      const fs = Math.min(rectH * 0.72, baseFontSize);

      // 白塗り（左側）
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fillRect(0, y - rectH / 2, W * 0.62, rectH);

      // 英語テキスト
      ctx.fillStyle = '#111111';
      ctx.font = `600 ${fs}px -apple-system,"Helvetica Neue",Arial,sans-serif`;
      ctx.textBaseline = 'middle';
      ctx.fillText(it.english, 6, y);

      // 点数と換算額
      if (it.yen != null) {
        ctx.fillStyle = '#cc0000';
        ctx.font = `700 ${fs * 0.88}px -apple-system,"Helvetica Neue",Arial,sans-serif`;
        ctx.fillText(`(${it.yen.toLocaleString()} Yen)`, W * 0.63, y);
      }
    });

    setProgress(92, '検出リスト作成中...');

    // 検出リスト表示
    const listEl = document.getElementById('wordList');
    listEl.innerHTML = '';
    transItems.forEach(it => {
      const d = document.createElement('div');
      d.className = 'word-item';
      let html = `<span class="jp">${it.japanese}</span><span class="arr">→</span><span class="en">${it.english}</span>`;
      if (it.yen != null) {
        html += `<span class="arr"> | ${it.points}点 →</span><span class="yen">${it.yen.toLocaleString()}円</span>`;
        if (it.points) html += `<span class="sub">${Math.round(selectedRatio*100)}%負担</span>`;
      }
      d.innerHTML = html;
      listEl.appendChild(d);
    });

    if (transItems.length > 0) document.getElementById('wordListWrap').style.display = 'block';

    setProgress(100, '完了！');
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('saveBtn').style.display = 'flex';

    let msg = `✅ ${transItems.length}件の項目を検出・翻訳しました。`;
    if (totalYen !== null) msg += `\n合計負担額: ${totalYen.toLocaleString()}円（合計に合わせて調整済み）`;
    showStatus(msg, 'success');

  } catch (err) {
    console.error(err);
    showStatus('❌ エラー:\n' + err.message, 'error');
  }

  setTimeout(() => { document.getElementById('progressSection').style.display = 'none'; }, 1200);
  document.getElementById('processBtn').disabled = false;
}

function saveImage() {
  const canvas = document.getElementById('outputCanvas');
  const link = document.createElement('a');
  link.download = 'medical_receipt_translated.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
