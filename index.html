<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医療領収書 翻訳＆円換算アプリ</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-bottom: 10px; }
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 25px; padding: 20px; background: #e9ecef; border-radius: 12px; }
        #canvas-container { position: relative; border: 2px solid #dee2e6; display: none; overflow: auto; margin-top: 20px; border-radius: 8px; }
        canvas { max-width: 100%; height: auto; }
        button, .upload-label { background: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .upload-label { background: #28a745; display: inline-block; }
        button:hover, .upload-label:hover { opacity: 0.8; }
        button:disabled { background: #adb5bd; cursor: not-allowed; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ced4da; font-size: 16px; }
        #status { margin: 15px 0; font-weight: bold; color: #495057; min-height: 1.2em; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏥 Medical Receipt Translator</h2>
    <p>項目を英語(黒)へ、点数を金額(赤/Yen)へ変換します</p>

    <div class="controls">
        <label class="upload-label">📸 写真を選択 / 撮影
            <input type="file" id="imageInput" accept="image/*">
        </label>
        
        <select id="ratio">
            <option value="0.3">負担割合：3割 (30%)</option>
            <option value="0.2">負担割合：2割 (20%)</option>
            <option value="0.1">負担割合：1割 (10%)</option>
            <option value="1.0">負担割合：10割 (100%)</option>
        </select>

        <button id="saveBtn" disabled>加工画像を保存 (Save Image)</button>
    </div>

    <div id="status">領収書をアップロードしてください</div>
    
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const saveBtn = document.getElementById('saveBtn');
    const ratioSelect = document.getElementById('ratio');

    // 医療・翻訳辞書
    const medicalDict = {
        "初診": "First Visit", "再診": "Follow-up", "投薬": "Medication",
        "注射": "Injection", "処置": "Procedure", "検査": "Test",
        "画像診断": "Imaging", "リハビリ": "Rehab", "処方": "Prescription",
        "外来": "Outpatient", "入院": "Inpatient", "合計": "TOTAL",
        "支払額": "Amount Paid", "点数": "Points", "負担金": "Copayment"
    };

    imageInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            document.getElementById('canvas-container').style.display = 'block';
            
            status.innerText = '🔍 文字を解析中... (OCR Processing)';
            saveBtn.disabled = true;
            
            try {
                const worker = await Tesseract.createWorker('jpn');
                const { data } = await worker.recognize(img);
                const ratio = parseFloat(ratioSelect.value);
                
                status.innerText = '✍️ 翻訳と計算結果を書き込み中...';

                data.lines.forEach(line => {
                    const text = line.text.replace(/\s+/g, '');
                    const box = line.bbox;
                    const fontSize = Math.floor((box.y1 - box.y0) * 0.9);

                    // 1. 翻訳処理（黒字で上書き）
                    for (let key in medicalDict) {
                        if (text.includes(key)) {
                            ctx.fillStyle = "white"; // 背景を消す
                            ctx.fillRect(box.x0, box.y0, box.x1 - box.x0, box.y1 - box.y0);
                            
                            ctx.fillStyle = "black"; // 黒字で英語
                            ctx.font = `bold ${fontSize}px Arial`;
                            ctx.fillText(medicalDict[key], box.x0, box.y1 - (fontSize * 0.1));
                        }
                    }

                    // 2. 金額換算（赤字でYen追記）
                    // 「点」という文字の前の数字を抽出
                    const scoreMatch = text.match(/(\d+)(?=点)/);
                    if (scoreMatch) {
                        const score = parseInt(scoreMatch[1]);
                        const yen = Math.round(score * 10 * ratio); // 10円×割合
                        
                        ctx.fillStyle = "red"; // 赤字
                        ctx.font = `bold ${fontSize}px Arial`;
                        // 元の数字のすぐ右側に追記
                        ctx.fillText(` (${yen.toLocaleString()} Yen)`, box.x1 + 10, box.y1 - (fontSize * 0.1));
                    }
                });

                await worker.terminate();
                status.innerText = '✅ 完了！画像を保存できます。';
                saveBtn.disabled = false;
                
            } catch (error) {
                console.error(error);
                status.innerText = '❌ エラーが発生しました。';
            }
        };
    });

    saveBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'translated_receipt.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>

</body>
</html>
