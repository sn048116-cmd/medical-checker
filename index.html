<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Medical Receipt Translator</title>
<!-- Tesseract v2 (Safari compatible, no worker import issues) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/2.1.5/tesseract.min.js"></script>
<style>
:root {
  --bg: #f4f6f9;
  --surface: #ffffff;
  --border: #e2e8f0;
  --accent: #1d4ed8;
  --accent-light: #eff6ff;
  --green: #059669;
  --red: #dc2626;
  --text: #1e293b;
  --text2: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 48px;
}
header {
  width: 100%;
  background: var(--accent);
  padding: 18px 20px 16px;
  text-align: center;
}
header h1 { font-size: 18px; font-weight: 700; color: #fff; }
header p  { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 3px; }

.container {
  width: 100%; max-width: 480px;
  padding: 16px;
  display: flex; flex-direction: column; gap: 14px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.card-title {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .8px;
  color: var(--text2); margin-bottom: 12px;
}

/* BURDEN */
.burden-row { display: flex; gap: 8px; }
.burden-btn {
  flex: 1; padding: 12px 4px;
  border: 2px solid var(--border); border-radius: 12px;
  background: var(--bg); font-size: 15px; font-weight: 700;
  color: var(--text2); cursor: pointer; transition: all .15s; text-align: center;
}
.burden-btn .label { display: block; font-size: 10px; font-weight: 400; margin-top: 2px; color: var(--text2); }
.burden-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.burden-btn.active .label { color: var(--accent); }

/* UPLOAD BUTTONS */
.upload-row { display: flex; gap: 10px; }
.upload-btn {
  flex: 1; padding: 18px 8px;
  border: 2px dashed var(--border); border-radius: 14px;
  background: var(--bg); cursor: pointer;
  text-align: center; transition: all .15s;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.upload-btn:active { opacity: .7; }
.upload-btn .ico { font-size: 30px; }
.upload-btn .lbl { font-size: 13px; font-weight: 600; color: var(--accent); }
.upload-btn .sub { font-size: 10px; color: var(--text2); }
input[type=file] { display: none; }

#previewSection { display: none; margin-top: 12px; }
#previewImg { width: 100%; border-radius: 12px; border: 1px solid var(--border); display: block; }
.change-link {
  display: block; text-align: center; margin-top: 10px;
  font-size: 13px; color: var(--accent); cursor: pointer; text-decoration: underline;
}

/* PROGRESS */
#progressSection { display: none; }
.progress-bar-wrap { background: var(--bg); border-radius: 999px; height: 10px; overflow: hidden; margin-bottom: 8px; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s ease; width: 0%; }
.progress-label { font-size: 13px; color: var(--text2); text-align: center; }

/* BUTTONS */
.btn {
  width: 100%; padding: 16px; border-radius: 14px; border: none;
  font-size: 16px; font-weight: 700; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: scale(.97); opacity: .85; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-success { background: var(--green); color: #fff; }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

#resultSection { display: none; }
#outputCanvas { width: 100%; border-radius: 12px; border: 1px solid var(--border); display: block; }

.status-box {
  border-radius: 10px; padding: 12px; font-size: 13px; line-height: 1.6; display: none;
  background: var(--accent-light); border: 1px solid #bfdbfe; color: var(--accent);
  white-space: pre-wrap;
}
.status-box.error   { background: #fef2f2; border-color: #fecaca; color: var(--red); }
.status-box.success { background: #f0fdf4; border-color: #bbf7d0; color: var(--green); }

#wordListWrap { display: none; }
.word-list { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
.word-item {
  display: flex; align-items: center; gap: 8px; font-size: 12px;
  padding: 7px 10px; background: var(--bg); border-radius: 8px; flex-wrap: wrap;
}
.word-item .jp  { color: var(--text); font-weight: 600; min-width: 80px; }
.word-item .arr { color: var(--text2); }
.word-item .en  { color: var(--accent); font-weight: 600; }
.word-item .yen { color: var(--red); font-weight: 700; }
.word-item .sub { color: var(--text2); margin-left: auto; font-size: 11px; }

.note {
  font-size: 11px; color: var(--text2); line-height: 1.6;
  background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 12px;
}
</style>
</head>
<body>

<header>
  <h1>🏥 Medical Receipt Translator</h1>
  <p>日本語の医療領収書を英語＆円換算</p>
</header>

<div class="container">

  <!-- STEP 1 -->
  <div class="card">
    <div class="card-title">① 窓口負担割合を選択</div>
    <div class="burden-row">
      <button class="burden-btn active" data-ratio="0.3" onclick="selectBurden(this)">30%<span class="label">一般（3割）</span></button>
      <button class="burden-btn" data-ratio="0.2" onclick="selectBurden(this)">20%<span class="label">2割</span></button>
      <button class="burden-btn" data-ratio="0.1" onclick="selectBurden(this)">10%<span class="label">高齢（1割）</span></button>
      <button class="burden-btn" data-ratio="1.0" onclick="selectBurden(this)">100%<span class="label">自費</span></button>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="card">
    <div class="card-title">② 領収書を選択</div>
    <div class="upload-row">
      <div class="upload-btn" onclick="triggerCamera()">
        <div class="ico">📷</div>
        <div class="lbl">カメラ撮影</div>
        <div class="sub">その場で撮る</div>
      </div>
      <div class="upload-btn" onclick="triggerLibrary()">
        <div class="ico">🖼️</div>
        <div class="lbl">写真を選択</div>
        <div class="sub">ライブラリから</div>
      </div>
    </div>
    <!-- カメラ用（capture=environment） -->
    <input type="file" id="fileCamera"   accept="image/*" capture="environment" onchange="handleFile(event)">
    <!-- ライブラリ用（captureなし） -->
    <input type="file" id="fileLibrary"  accept="image/*" onchange="handleFile(event)">

    <div id="previewSection">
      <img id="previewImg" src="" alt="preview">
      <span class="change-link" onclick="triggerLibrary()">📁 別の画像を選択</span>
    </div>
  </div>

  <!-- STEP 3 -->
  <button class="btn btn-primary" id="processBtn" onclick="processImage()" disabled>
    🔍 OCR解析＆翻訳を実行
  </button>

  <div class="card" id="progressSection">
    <div class="card-title">処理中...</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">準備中...</div>
  </div>

  <div id="statusBox" class="status-box"></div>

  <div class="card" id="wordListWrap">
    <div class="card-title">検出された項目</div>
    <div class="word-list" id="wordList"></div>
  </div>

  <div class="card" id="resultSection">
    <div class="card-title">翻訳済み画像プレビュー</div>
    <canvas id="outputCanvas"></canvas>
  </div>

  <button class="btn btn-success" id="saveBtn" onclick="saveImage()" style="display:none;">
    💾 画像として保存（ダウンロード）
  </button>

  <p class="note">
    ⚠️ OCRの精度は画像の鮮明さ・照明に依存します。明るい場所で領収書全体が写るよう撮影してください。<br>
    ※ 換算: 各点数を負担割合で計算後、合計金額と一致するよう自動調整します。
  </p>

</div>

<script>
// ===================== 翻訳辞書 =====================
const DICT = [
  { jp:'初診料',           en:'Initial Visit Fee' },
  { jp:'初診',             en:'Initial Visit' },
  { jp:'再診料',           en:'Follow-up Visit Fee' },
  { jp:'再診',             en:'Follow-up Visit' },
  { jp:'外来診療料',       en:'Outpatient Fee' },
  { jp:'診察料',           en:'Consultation Fee' },
  { jp:'診察',             en:'Consultation' },
  { jp:'院内処方',         en:'In-hospital Rx' },
  { jp:'院外処方',         en:'External Prescription' },
  { jp:'処方せん料',       en:'Prescription Fee' },
  { jp:'処方箋料',         en:'Prescription Fee' },
  { jp:'処方料',           en:'Prescription Fee' },
  { jp:'処方',             en:'Prescription' },
  { jp:'投薬',             en:'Medication' },
  { jp:'調剤技術料',       en:'Dispensing Fee' },
  { jp:'調剤',             en:'Dispensing' },
  { jp:'薬剤料',           en:'Drug Fee' },
  { jp:'薬剤',             en:'Drug' },
  { jp:'内服薬',           en:'Oral Medicine' },
  { jp:'外用薬',           en:'Topical Medicine' },
  { jp:'湿布',             en:'Poultice' },
  { jp:'点眼薬',           en:'Eye Drops' },
  { jp:'点鼻薬',           en:'Nasal Drops' },
  { jp:'皮下注射',         en:'Subcutaneous Inj.' },
  { jp:'筋肉内注射',       en:'IM Injection' },
  { jp:'静脈注射',         en:'IV Injection' },
  { jp:'点滴注射',         en:'IV Drip' },
  { jp:'注射',             en:'Injection' },
  { jp:'尿検査',           en:'Urinalysis' },
  { jp:'血液検査',         en:'Blood Test' },
  { jp:'レントゲン',       en:'X-ray' },
  { jp:'ＣＴ検査',         en:'CT Scan' },
  { jp:'CT検査',           en:'CT Scan' },
  { jp:'ＭＲＩ検査',       en:'MRI Scan' },
  { jp:'MRI',              en:'MRI' },
  { jp:'超音波検査',       en:'Ultrasound' },
  { jp:'心電図',           en:'ECG' },
  { jp:'検体検査',         en:'Specimen Test' },
  { jp:'病理検査',         en:'Pathology' },
  { jp:'画像診断',         en:'Imaging Diagnosis' },
  { jp:'検査',             en:'Examination' },
  { jp:'創傷処置',         en:'Wound Care' },
  { jp:'外科処置',         en:'Surgical Procedure' },
  { jp:'ネブライザー',     en:'Nebulizer' },
  { jp:'吸入',             en:'Inhalation' },
  { jp:'処置',             en:'Treatment' },
  { jp:'リハビリテーション', en:'Rehabilitation' },
  { jp:'リハビリ',         en:'Rehab' },
  { jp:'運動療法',         en:'Exercise Therapy' },
  { jp:'物理療法',         en:'Physical Therapy' },
  { jp:'特定疾患管理料',   en:'Chronic Disease Mgmt.' },
  { jp:'特定薬剤管理指導料', en:'Medication Guidance' },
  { jp:'薬剤情報提供料',   en:'Drug Info. Fee' },
  { jp:'医学管理料',       en:'Medical Mgmt. Fee' },
  { jp:'管理料',           en:'Management Fee' },
  { jp:'指導料',           en:'Guidance Fee' },
  { jp:'入院基本料',       en:'Hospitalization (Basic)' },
  { jp:'入院',             en:'Hospitalization' },
  { jp:'食事療養費',       en:'Meal Therapy Fee' },
  { jp:'食事',             en:'Meal' },
  { jp:'合計点数',         en:'Total Points' },
  { jp:'合計金額',         en:'Total Amount' },
  { jp:'合計',             en:'Total' },
  { jp:'小計',             en:'Subtotal' },
  { jp:'一部負担金',       en:'Patient Copay' },
  { jp:'窓口負担',         en:'Copay' },
  { jp:'負担金',           en:'Copay' },
  { jp:'保険点数',         en:'Insurance Points' },
  { jp:'保険',             en:'Insurance' },
  { jp:'自費',             en:'Self-Pay' },
  { jp:'消費税',           en:'Tax' },
  { jp:'文書料',           en:'Document Fee' },
  { jp:'時間外',           en:'After Hours' },
  { jp:'休日',             en:'Holiday' },
  { jp:'夜間',             en:'Night' },
  { jp:'往診',             en:'House Call' },
  { jp:'領収書',           en:'Receipt' },
  { jp:'医療費',           en:'Medical Expense' },
  { jp:'氏名',             en:'Name' },
  { jp:'診療日',           en:'Visit Date' },
  { jp:'病院',             en:'Hospital' },
  { jp:'クリニック',       en:'Clinic' },
];

// ===================== 状態 =====================
let selectedRatio = 0.3;
let loadedImageSrc = null; // dataURL (EXIF補正済み)

// ===================== UI =====================
function selectBurden(btn) {
  document.querySelectorAll('.burden-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedRatio = parseFloat(btn.dataset.ratio);
}
function triggerCamera()  { document.getElementById('fileCamera').click(); }
function triggerLibrary() { document.getElementById('fileLibrary').click(); }

function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}
function showStatus(msg, type) {
  const b = document.getElementById('statusBox');
  b.textContent = msg;
  b.className = 'status-box' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
  b.style.display = 'block';
}

// ===================== EXIF回転補正 =====================
function getExifOrientation(buffer) {
  const view = new DataView(buffer);
  if (view.getUint16(0, false) !== 0xFFD8) return -2;
  let offset = 2;
  while (offset < view.byteLength) {
    if (view.getUint16(offset, false) === 0xFFE1) {
      offset += 4;
      if (view.getUint32(offset, false) !== 0x45786966) return -1;
      const little = view.getUint16(offset + 6, false) === 0x4949;
      offset += 6 + view.getUint32(offset + 4, little);
      const tags = view.getUint16(offset, little);
      offset += 2;
      for (let i = 0; i < tags; i++) {
        if (view.getUint16(offset + i * 12, little) === 0x0112) {
          return view.getUint16(offset + i * 12 + 8, little);
        }
      }
    } else if ((view.getUint16(offset, false) & 0xFF00) !== 0xFF00) break;
    else offset += 2 + view.getUint16(offset + 2, false);
  }
  return -1;
}

function correctImageOrientation(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const buffer = e.target.result;
      const orientation = getExifOrientation(buffer);
      const blob = new Blob([buffer], { type: file.type });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let w = img.naturalWidth, h = img.naturalHeight;
        // 90/270度回転の場合は幅・高さを入れ替え
        if ([5,6,7,8].includes(orientation)) { canvas.width = h; canvas.height = w; }
        else { canvas.width = w; canvas.height = h; }
        ctx.save();
        switch (orientation) {
          case 2: ctx.transform(-1,0,0,1,w,0); break;
          case 3: ctx.transform(-1,0,0,-1,w,h); break;
          case 4: ctx.transform(1,0,0,-1,0,h); break;
          case 5: ctx.transform(0,1,1,0,0,0); break;
          case 6: ctx.transform(0,1,-1,0,h,0); break;
          case 7: ctx.transform(0,-1,-1,0,h,w); break;
          case 8: ctx.transform(0,-1,1,0,0,w); break;
          default: break;
        }
        ctx.drawImage(img, 0, 0);
        ctx.restore();
        URL.revokeObjectURL(url);
        resolve(canvas.toDataURL('image/jpeg', 0.95));
      };
      img.src = url;
    };
    reader.readAsArrayBuffer(file);
  });
}

// ===================== ファイル選択 =====================
async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  // input をリセット（同じファイルを再選択できるように）
  e.target.value = '';

  const corrected = await correctImageOrientation(file);
  loadedImageSrc = corrected;

  document.getElementById('previewImg').src = corrected;
  document.getElementById('previewSection').style.display = 'block';
  document.getElementById('processBtn').disabled = false;
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('wordListWrap').style.display = 'none';
  document.getElementById('statusBox').style.display = 'none';
}

// ===================== 数値正規化 =====================
function parseJpNum(str) {
  // 全角数字→半角、カンマ除去
  return parseInt(
    str.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
       .replace(/[,，、]/g, ''),
    10
  );
}

// ===================== メイン処理 =====================
async function processImage() {
  if (!loadedImageSrc) return;
  document.getElementById('processBtn').disabled = true;
  document.getElementById('progressSection').style.display = 'block';
  document.getElementById('wordListWrap').style.display = 'none';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('statusBox').style.display = 'none';

  try {
    setProgress(5, 'OCRエンジンを準備中...');

    // Tesseract v2 API (Safari互換)
    const result = await Tesseract.recognize(loadedImageSrc, 'jpn', {
      logger: m => {
        if (m.status === 'recognizing text') {
          setProgress(8 + Math.round(m.progress * 65), `OCR処理中... ${Math.round(m.progress * 100)}%`);
        }
      }
    });

    setProgress(76, 'テキスト解析中...');

    const words = result.data.words  || [];
    const lines = result.data.lines  || [];
    const fullText = result.data.text || '';

    // --- 合計金額（円）を検出 ---
    // 「合計」「負担金」などの行に続く ¥数字 or 数字円 を探す
    let totalYen = null;
    {
      const totalMatch = fullText.match(/(?:合計|一部負担金|窓口負担|負担金)[^\d０-９]*([0-9０-９,，]+)\s*円/);
      if (totalMatch) {
        totalYen = parseJpNum(totalMatch[1]);
      }
      // ¥記号パターン
      if (!totalYen) {
        const yenMatch = fullText.match(/(?:合計|一部負担金|窓口負担)[^\d０-９]*[¥￥]\s*([0-9０-９,，]+)/);
        if (yenMatch) totalYen = parseJpNum(yenMatch[1]);
      }
    }

    // --- 点数を検出（全ワード走査）---
    const pointMatches = []; // { bbox, points, wordText }
    let totalPointsDetected = 0;
    let isTotalLine = false;

    // ラインごとに「合計」ラインかチェックしつつ点数を集める
    const totalLineKeywords = ['合計点数','合計','小計'];
    lines.forEach(line => {
      const lineTxt = line.words.map(w => w.text).join('');
      const isTotal = totalLineKeywords.some(k => lineTxt.includes(k));

      line.words.forEach(word => {
        const txt = word.text.replace(/\s/g, '');
        const m = txt.match(/^([0-9０-９,，]+)[点]$/);
        if (m) {
          const pts = parseJpNum(m[1]);
          if (!isNaN(pts) && pts > 0 && pts < 100000) {
            if (isTotal) {
              // 合計点数として記録（換算対象外）
              totalPointsDetected = Math.max(totalPointsDetected, pts);
            } else {
              pointMatches.push({ bbox: word.bbox, points: pts, yen: null });
            }
          }
        }
      });
    });

    // --- 合計金額と一致するよう各点数のYenを按分調整 ---
    // 計算方法:
    //  1) まず各点数を素直に計算（10円未満四捨五入）
    //  2) 合計金額がOCRで取れた場合、差分を最大点数の項目に吸収
    let sumRaw = 0;
    pointMatches.forEach(pm => {
      const raw = Math.round((pm.points * 10 * selectedRatio) / 10) * 10;
      pm.yen = raw;
      sumRaw += raw;
    });

    if (totalYen !== null && pointMatches.length > 0) {
      const diff = totalYen - sumRaw;
      if (diff !== 0) {
        // 最大点数の項目に差分を加算（調整）
        let maxIdx = 0;
        pointMatches.forEach((pm, i) => { if (pm.points > pointMatches[maxIdx].points) maxIdx = i; });
        pointMatches[maxIdx].yen += diff;
      }
    }

    // --- ライン翻訳検出（最長マッチ優先）---
    const lineTranslations = [];
    const usedLines = new Set();

    lines.forEach((line, li) => {
      const lineTxt = line.words.map(w => w.text).join('');
      let best = null;
      for (const entry of DICT) {
        if (lineTxt.includes(entry.jp)) {
          if (!best || entry.jp.length > best.jp.length) best = entry;
        }
      }
      if (best && !usedLines.has(li)) {
        usedLines.add(li);
        lineTranslations.push({ entry: best, lineBbox: line.bbox });
      }
    });

    setProgress(84, 'Canvas描画中...');

    // --- Canvas描画 ---
    const img = new Image();
    await new Promise(res => { img.onload = res; img.src = loadedImageSrc; });

    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);

    const W = img.naturalWidth;
    const baseFontSize = Math.max(16, Math.round(W / 32));

    // 翻訳描画
    lineTranslations.forEach(({ entry, lineBbox: b }) => {
      const h = b.y1 - b.y0;
      const fs = Math.min(h * 0.78, baseFontSize);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(b.x0, b.y0, b.x1 - b.x0, h);
      ctx.fillStyle = '#111111';
      ctx.font = `600 ${fs}px -apple-system,"Helvetica Neue",Arial,sans-serif`;
      ctx.textBaseline = 'middle';
      ctx.fillText(entry.en, b.x0 + 3, b.y0 + h * 0.5);
    });

    // 点数→円換算（赤字）
    pointMatches.forEach(({ bbox: b, yen }) => {
      const h = b.y1 - b.y0;
      const fs = Math.min(h * 0.72, baseFontSize * 0.85);
      ctx.fillStyle = '#cc0000';
      ctx.font = `700 ${fs}px -apple-system,"Helvetica Neue",Arial,sans-serif`;
      ctx.textBaseline = 'middle';
      ctx.fillText(`(${yen.toLocaleString()} Yen)`, b.x1 + 5, b.y0 + h * 0.5);
    });

    setProgress(96, '仕上げ中...');

    // --- 検出リスト ---
    const listEl = document.getElementById('wordList');
    listEl.innerHTML = '';
    lineTranslations.forEach(({ entry }) => {
      const d = document.createElement('div');
      d.className = 'word-item';
      d.innerHTML = `<span class="jp">${entry.jp}</span><span class="arr">→</span><span class="en">${entry.en}</span>`;
      listEl.appendChild(d);
    });
    pointMatches.forEach(({ points, yen }) => {
      const d = document.createElement('div');
      d.className = 'word-item';
      d.innerHTML = `<span class="jp">${points}点</span><span class="arr">→</span><span class="yen">${yen.toLocaleString()} 円</span><span class="sub">${Math.round(selectedRatio*100)}%負担</span>`;
      listEl.appendChild(d);
    });
    if (lineTranslations.length > 0 || pointMatches.length > 0) {
      document.getElementById('wordListWrap').style.display = 'block';
    }

    setProgress(100, '完了！');
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('saveBtn').style.display = 'flex';

    const total = lineTranslations.length + pointMatches.length;
    let msg = '';
    if (total === 0) {
      showStatus('⚠️ テキストが検出できませんでした。明るい場所で、領収書全体がはっきり写るよう撮影してください。', 'error');
    } else {
      msg = `✅ ${lineTranslations.length}件の項目を翻訳、${pointMatches.length}件の点数を換算しました。`;
      if (totalYen !== null) msg += `\n合計金額: ${totalYen.toLocaleString()}円 に合わせて調整済み。`;
      showStatus(msg, 'success');
    }

  } catch (err) {
    console.error(err);
    showStatus('❌ エラーが発生しました:\n' + err.message, 'error');
  }

  setTimeout(() => { document.getElementById('progressSection').style.display = 'none'; }, 1500);
  document.getElementById('processBtn').disabled = false;
}

// ===================== 保存 =====================
function saveImage() {
  const canvas = document.getElementById('outputCanvas');
  const link = document.createElement('a');
  link.download = 'medical_receipt_translated.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
